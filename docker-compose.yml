services:

  db:
    image: postgres:16
    container_name: sge_db
    restart: always
    environment:
      POSTGRES_DB: sge
      POSTGRES_USER: sge_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sge_user -d sge"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/mgvictoriano/sge-backend:latest
    container_name: sge_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sge
      SPRING_DATASOURCE_USERNAME: sge_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    networks:
      - sge_network

  frontend:
    image: ghcr.io/mgvictoriano/sge-frontend:latest
    container_name: sge_frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - sge_network

  nginx:
    image: nginx:alpine
    container_name: sge_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /data/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
      - frontend
    networks:
      - sge_network

networks:
  sge_network:
    driver: bridge
